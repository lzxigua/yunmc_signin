name: 海绵科创签到和续费

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '14'

      - name: 执行签到续费
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          SERVER_ID: ${{ secrets.SERVER_ID }}
        run: node auto_renew.js